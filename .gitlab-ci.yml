stages:
  - test
  - build
  - deploy

variables:
  STAGING_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  STAGING_LATEST_IMAGE: $CI_REGISTRY_IMAGE:staging
  PROD_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  PROD_LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest

test:
  image: golang:1.21
  stage: test
  services:
    - name: postgres:12
      alias: postgres
    - name: nats:2.10-alpine
      alias: nats
      command: ["-js", "-user", "testuser", "-pass", "testpass"]
  variables:
    # PostgreSQL service configuration
    POSTGRES_DB: orders_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
    # Application test configuration
    PGHOST: postgres
    PGPORT: "5432"
    PGUSER: postgres
    PGPASSWORD: postgres
    PGDATABASE: orders_test
    PGSSLMODE: disable
    NATS_URL: "nats://testuser:testpass@nats:4222"
    APP_ENV: test
    APP_MODE: debug
    PRIORITY_BASE_URL: "http://priority.test"
    PRIORITY_USERNAME: "test"
    PRIORITY_PASSWORD: "test"
    ACCOUNTING_SERVICE_URL: "http://accounting.test"
    QUICKBOOKS_COMPANY_ID: "test-company-id"
  before_script:
    # Wait for PostgreSQL to be ready
    - apt-get update && apt-get install -y postgresql-client netcat-openbsd
    - until PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U $POSTGRES_USER -d $POSTGRES_DB -c '\q'; do
        echo "PostgreSQL is unavailable - sleeping";
        sleep 2;
      done
    - echo "PostgreSQL is up"
    # Wait for NATS to be ready
    - until nc -z nats 4222; do
        echo "NATS is unavailable - sleeping";
        sleep 2;
      done
    - echo "NATS is up"
  script:
    - go mod download
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
  only:
    - master
    - tags
    - merge_requests

build_staging:
  image: docker:latest
  stage: build
  services:
    - docker:26.0.0-dind
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker pull $STAGING_LATEST_IMAGE
    - docker build --cache-from $STAGING_LATEST_IMAGE --build-arg GIT_SHA=$CI_COMMIT_SHA -t $STAGING_IMAGE .
    - docker tag $STAGING_IMAGE $STAGING_LATEST_IMAGE
    - docker push $STAGING_IMAGE
    - docker push $STAGING_LATEST_IMAGE
  only:
    - master

deploy_staging:
  variables:
    DB_HOST: "ordersdb"
    DB_PORT: ${DEV_PG_PORT}
    DB_USER: ${DEV_ORDER_PG_USER}
    DB_DATABASE: ${DEV_ORDER_PG_DBNAME}
    DB_PASSWORD: ${DEV_PG_PWD}
    APP_PORT: "8185"
    APP_MODE: "release"
    APP_ENV: "staging"
    NATS_USER: ${DYN_STAGING_NATS_USER}
    NATS_PASSWORD: ${DYN_STAGING_NATS_PASSWORD}
    NATS_URL: "nats://${DYN_STAGING_NATS_USER}:${DYN_STAGING_NATS_PASSWORD}@nats:4222"
    S3_SECRET_KEY: ${S3_SECRET_KEY}
    S3_ACCESS_KEY: ${S3_ACCESS_KEY}
    S3_REGION: ${S3_REGION}
    S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    S3_ENDPOINT: ${S3_ENDPOINT}
    PELECARD_USER: ${PELECARD_USER}
    PELECARD_PASSWORD: ${PELECARD_PASSWORD}
    SUFX: ${DEV_SUFX}
    KEYCLOAK_SERVER_URL: ${DYN_STAGING_KEYCLOAK_SERVER_BASE_URL}
    KEYCLOAK_REALM: ${DYN_STAGING_KEYCLOAK_REALM}
    KEYCLOAK_CLIENT_ID: ${DYN_STAGING_KEYCLOAK_CONFIDENTIAL_CLIENT_ID}
    KEYCLOAK_CLIENT_SECRET: ${DYN_STAGING_KEYCLOAK_CONFIDENTIAL_CLIENT_SECRET}
    PROFILE_SERVICE_URL: ${DYN_STAGING_PROFILE_SERVICE_URL}
    ACCOUNTING_SERVICE_URL: ${DYN_STAGING_ACCOUNTING_SERVICE_URL}
    SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    SENTRY_DSN: ${STAGING_ORDERS_SENTRY_DSN}
    PRIORITY_BASE_URL: "http://priority.staging"
    PRIORITY_USERNAME: "staging"
    PRIORITY_PASSWORD: "staging"
    QUICKBOOKS_COMPANY_ID: ${DYN_STAGING_QUICKBOOKS_COMPANY_ID}
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.8.0
  stage: deploy
  tags:
    - staging
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$STAGING_IMAGE docker compose up -d ordersdb nats
    - sleep 60
    - IMAGE_NAME=$STAGING_IMAGE docker compose up -d vh-srv-orders
  only:
    - master


build_production:
  image: docker:latest
  stage: build
  services:
    - docker:26.0.0-dind
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker build --build-arg GIT_SHA=$CI_COMMIT_SHA -t $PROD_IMAGE .
    - docker push $PROD_IMAGE
  only:
    - tags

deploy_production:
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.8.0
  stage: deploy
  tags:
    - production
  variables:
    DB_HOST: ${PROD_PG_HOST}
    DB_PORT: ${PROD_PG_PORT}
    DB_USER: ${PROD_ORDER_PG_USER}
    DB_DATABASE: ${PROD_ORDER_PG_DBNAME}
    DB_PASSWORD: ${PROD_PG_PWD}
    APP_PORT: "8185"
    APP_MODE: "release"
    APP_ENV: "production"
    NATS_USER: ${DYN_PROD_NATS_USER}
    NATS_PASSWORD: ${DYN_PROD_NATS_PASSWORD}
    NATS_URL: "nats://${DYN_PROD_NATS_USER}:${DYN_PROD_NATS_PASSWORD}@nats:4222"
    SUFX: ${PROD_SUFX}
    KEYCLOAK_SERVER_URL: ${DYN_PROD_KEYCLOAK_SERVER_BASE_URL}
    KEYCLOAK_REALM: ${DYN_PROD_KEYCLOAK_REALM}
    KEYCLOAK_CLIENT_ID: ${DYN_PROD_KEYCLOAK_CONFIDENTIAL_CLIENT_ID}
    KEYCLOAK_CLIENT_SECRET: ${DYN_PROD_KEYCLOAK_CONFIDENTIAL_CLIENT_SECRET}
    PROFILE_SERVICE_URL: ${DYN_PROD_PROFILE_SERVICE_URL}
    ACCOUNTING_SERVICE_URL: ${DYN_PROD_ACCOUNTING_SERVICE_URL}
    SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    SENTRY_DSN: ${PROD_ORDERS_SENTRY_DSN}
    IMPORT_SPECIALS_SPREADSHEET_ID: ${PROD_IMPORT_SPECIALS_SPREADSHEET_ID}
    RENEWAL_MAX_WORKERS: "5"
    PELECARD_USER: ${PELECARD_USER}
    PELECARD_PASSWORD: ${PELECARD_PASSWORD}
    PELECARD_OLD_TERMINAL_NUMBER: ${PELECARD_OLD_TERMINAL_NUMBER}
    PELECARD_NEW_TERMINAL_NUMBER: ${PELECARD_NEW_TERMINAL_NUMBER}
    PRIORITY_BASE_URL: ${PRIORITY_BASE_URL}
    PRIORITY_USERNAME: ${PRIORITY_USERNAME}
    PRIORITY_PASSWORD: ${PRIORITY_PASSWORD}
    QUICKBOOKS_COMPANY_ID: ${DYN_PROD_QUICKBOOKS_COMPANY_ID}
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$PROD_IMAGE docker compose up -d nats
    - sleep 10
    - IMAGE_NAME=$PROD_IMAGE docker compose up -d vh-srv-orders
  only:
    - tags
  when: manual

